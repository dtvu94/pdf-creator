# ─── Project identification ──────────────────────────────────────────────────
sonar.projectKey=pdf-creator
sonar.projectName=PDF Creator
sonar.projectVersion=1.0.0

# ─── Source ──────────────────────────────────────────────────────────────────
sonar.sources=app,components,hooks,lib,types
sonar.tests=app,components,hooks,lib
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/public/**

# ─── Language / encoding ────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ─── Coverage ───────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/types/**

# ─── Duplication exclusions ─────────────────────────────────────────────────
sonar.cpd.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx
